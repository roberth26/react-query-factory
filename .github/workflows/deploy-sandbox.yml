name: Deploy sandbox

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sandbox/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: sandbox

      - name: Build
        run: npm run build
        working-directory: sandbox
        env:
          VITE_BASE_URL: /react-query-factory/

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: sandbox/dist

      - id: deployment
        uses: actions/deploy-pages@v4
